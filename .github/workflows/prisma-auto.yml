name: Prisma Auto Update

permissions:
  contents: write

on:
  schedule:
    - cron: "30 */2 * * *"   # cada 2 horas (minuto 30)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      # 🚀 NUEVO: Cache para el modelo de HuggingFace
      - name: Cache modelo HuggingFace
        uses: actions/cache@v3
        id: cache-modelo
        with:
          path: ~/.cache/huggingface
          key: huggingface-modelo-${{ runner.os }}-${{ hashFiles('**/rss_prisma.py') }}
          restore-keys: |
            huggingface-modelo-${{ runner.os }}-
            huggingface-modelo-

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install feedparser sentence-transformers numpy scikit-learn jinja2

      - name: Debug estructura
        run: ls -la

      - name: Generar página principal
        run: python rss_prisma.py
        continue-on-error: false

      - name: Guardar caché para modo vigilante
        run: |
          if [ -f "noticias_cache.json" ]; then
            echo "✅ Caché de noticias guardado correctamente"
          else
            echo "⚠️ No se encontró noticias_cache.json"
          fi

      - name: Limpiar búsquedas antiguas del modo vigilante
        run: |
          rm -f vigilante_*.html
          echo "🧹 Limpieza de búsquedas antiguas completada"

      - name: Verificar cambios
        id: verificar
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "cambios=true" >> $GITHUB_OUTPUT
          else
            echo "cambios=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit y push
        if: steps.verificar.outputs.cambios == 'true'
        run: |
          git config user.name "Prisma Bot"
          git config user.email "bot@prisma.com"
          
          git add index.html espana.html sobre.html vigilante.html sitemap.xml robots.txt noticias_cache.json
          git diff --cached --quiet || git commit -m "🤖 Actualización automática $(date +'%d/%m/%Y %H:%M')"
          
          git pull --no-rebase origin main --strategy-option=theirs
          git push origin main

      - name: Trigger GitHub Pages rebuild
        if: steps.verificar.outputs.cambios == 'true'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
